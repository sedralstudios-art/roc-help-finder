    <title>HelpFinder — Free Help, Everywhere</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #fafaf7; }
      /* Smooth handoff from the prerendered SEO shell to the React app.
         The shell stays visible while React downloads (so crawlers and slow
         connections see real content). Once React mounts, main.jsx fades the
         shell out via this transition and then removes it from the DOM.
         The React tree fades in via its own opacity animation. */
      #prerender-content { transition: opacity 0.15s ease-out; }
      @keyframes hf-app-in { from { opacity: 0; } to { opacity: 1; } }
      #root:not(:empty) { animation: hf-app-in 0.25s ease-out both; }
    </style>

    <!-- Preload the single webfont so headings don't flash in Georgia before
         DM Serif Display arrives. Must be crossorigin for font files even on
         same origin, otherwise the browser will ignore the preload. -->
    <link rel="preload" href="/DMSerifDisplay-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="/fonts.css" />

    <!-- Analytics: Umami (privacy-first, cookie-free, self-hosted) -->

    <!-- <script defer src="https://YOUR_UMAMI_URL/script.js" data-website-id="YOUR_SITE_ID"></script> -->
    <!-- Until Umami is deployed, this line is commented out. Uncomment when ready. -->
